<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BrawlMap News</title>
  <link href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="designed.css">

<style>
/* ── Rich editor toolbar ── */
.rich-toolbar {
  display: flex; gap: 4px; margin-bottom: 4px; flex-wrap: wrap;
}
.rich-toolbar button {
  background: var(--bg3, #2a2a3a); border: 1px solid var(--border);
  color: var(--text); border-radius: 5px; padding: 3px 10px;
  font-size: 13px; cursor: pointer; line-height: 1.6;
}
.rich-toolbar button:hover { background: var(--purple, #7c3aed); color: #fff; }

/* ── Edit modal ── */
#modal-edit .modal { max-width: 600px; }
</style>
</head>
<body>
<div id="nav-root"></div>
<script src="nav-loader.js"></script>

<!-- ══ NEWS LIST PAGE ══ -->
<div class="page active" id="view-feed">
  <div class="news-wrap">

    <div class="news-header">
      <h1>📰 News</h1>
      <button class="admin-toggle" onclick="openAdminGate()">✏️ Admin</button>
    </div>


    <div class="category-filters" id="cat-filters">
      <select class="category-dropdown" id="cat-dropdown" onchange="filterCat(this.value)">
        <option value="all">All Categories</option>
        <option value="news">🗞️ News</option>
        <option value="maintenance">🧑‍🔧 Maintenance</option>
        <option value="cosmetics">✨ Cosmetics</option>
        <option value="brawlpass">🎟️ Brawl Pass</option>
        <option value="brawltalk">📢 Brawl Talk</option>
      </select>
      <div class="search-wrapper">
        <span class="search-icon">
          <svg width="0" height="0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </span>
        <input type="text" class="search-input" id="search-input" placeholder="Search news…"
          oninput="filterSearch(this.value); document.getElementById('search-clear').classList.toggle('visible', this.value.length > 0)" />
        <button class="search-clear" id="search-clear" onclick="clearSearch()" title="Clear search">✕</button>
      </div>
    </div>

    <div class="news-grid" id="news-feed"></div>

  </div>
</div>

<!-- ══ SINGLE POST PAGE ══ -->
<div class="post-page" id="view-post">
  <div class="post-page-wrap">
    <div class="post-topbar">
      <button class="post-back" onclick="goBack()">← Back to News</button>
      <button class="post-copy-url" onclick="copyPostUrl()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        Copy URL
      </button>
    </div>
    <div id="post-content"></div>
  </div>
</div>

<!-- ══ AUTH GATE MODAL ══ -->
<div class="modal-overlay" id="modal-auth">
  <div class="modal" style="max-width:380px">
    <h2>🔐 Admin Login</h2>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="auth-pw" placeholder="Enter admin password" onkeydown="if(event.key==='Enter')tryLogin()" />
      <div class="auth-error" id="auth-error"></div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('modal-auth')">Cancel</button>
      <button class="btn-publish" onclick="tryLogin()">Login</button>
    </div>
  </div>
</div>

<!-- ══ ADMIN PANEL MODAL ══ -->
<div class="modal-overlay" id="modal-admin">
  <div class="modal" style="max-width:600px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem">
      <h2 style="margin-bottom:0">⚙️ Admin Panel</h2>
      <div style="display:flex;gap:8px">
        <button class="btn-cancel" onclick="closeModal('modal-admin')">Close</button>
        <button class="btn-cancel" style="color:#f87171;border-color:#ef4444" onclick="logoutAdmin()">Logout</button>
      </div>
    </div>

    <!-- Tabs -->
    <div class="admin-tabs">
      <button class="admin-tab-btn active" onclick="switchAdminTab('posts', this)">📰 Posts</button>
      <button class="admin-tab-btn" onclick="switchAdminTab('countdown', this)">⏳ Countdowns</button>
    </div>

    <!-- Posts tab -->
    <div class="admin-tab-panel active" id="admin-tab-posts">
      <details open style="margin-bottom:1.5rem">
        <summary style="cursor:pointer;font-weight:800;color:var(--text2);font-size:13px;letter-spacing:0.4px;text-transform:uppercase;margin-bottom:1rem">＋ New Post</summary>
        <div style="padding-top:0.75rem">
          <div class="form-group">
            <label>Category</label>
            <select id="new-cat">
              <option value="news">🗞️ News</option>
              <option value="maintenance">🧑‍🔧 Maintenance</option>
              <option value="cosmetics">✨ Cosmetics</option>
              <option value="brawlpass">🎟️ Brawl Pass</option>
              <option value="brawltalk">📢 Brawl Talk</option>
            </select>
          </div>
          <div class="form-group">
            <label>Title</label>
            <input type="text" id="new-title" placeholder="Post title…" />
          </div>
          <div class="form-group">
            <label>Description <span style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--text3)">(shown under title &amp; on cards)</span></label>
            <input type="text" id="new-excerpt" placeholder="Short description…" />
          </div>
          <div class="form-group">
            <label>Publish date</label>
            <input type="datetime-local" id="new-date" />
          </div>
          <div class="form-group">
            <label>Full content</label>
            <div class="rich-toolbar">
              <button type="button" onclick="fmtH1()" title="Heading 1"><b>H1</b></button>
              <button type="button" onclick="fmtH2()" title="Heading 2"><b>H2</b></button>
              <button type="button" onclick="fmtBold()" title="Bold"><b>B</b></button>
              <button type="button" onclick="insertContentImage()" title="Insert image">🖼</button>
            </div>
            <textarea id="new-body" placeholder="Write the full article here… Use **bold**, ## Heading 2, # Heading 1" style="min-height:160px;font-family:monospace;font-size:13px"></textarea>
          </div>
          <div class="form-group">
            <label>Banner image</label>
            <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
              <button type="button" class="btn-cancel" style="font-size:12px" onclick="triggerBannerUpload()">⬆ Upload image</button>
              <input type="file" id="image-upload" accept="image/*" style="display:none" />
              <input type="text" id="new-img" placeholder="or paste URL…" style="flex:1;min-width:160px" />
            </div>
            <div id="new-img-preview" style="margin-top:6px"></div>
          </div>
          <div class="form-group">
            <label>Author</label>
            <input type="text" id="new-author" placeholder="Your name" value="Admin" />
          </div>
          <button class="btn-publish" onclick="publishPost()" style="width:100%;margin-top:0.25rem">Publish Post</button>
          <div class="auth-error" id="publish-error" style="margin-top:6px"></div>
        </div>
      </details>

      <div style="font-weight:800;color:var(--text2);font-size:13px;letter-spacing:0.4px;text-transform:uppercase;margin-bottom:0.75rem">Manage Posts</div>
      <div id="admin-post-list"></div>
    </div>

    <!-- Countdown tab -->
    <div class="admin-tab-panel" id="admin-tab-countdown">
      <details open style="margin-bottom:1.5rem">
        <summary style="cursor:pointer;font-weight:800;color:var(--text2);font-size:13px;letter-spacing:0.4px;text-transform:uppercase;margin-bottom:1rem">＋ New Countdown</summary>
        <div style="padding-top:0.75rem">
          <div class="form-group">
            <label>Title</label>
            <input type="text" id="cd-title" placeholder="e.g. Season 25 Start" />
          </div>
          <div class="form-group">
            <label>Description (optional)</label>
            <input type="text" id="cd-desc" placeholder="Short description…" />
          </div>
          <div class="form-group">
            <label>Target date &amp; time</label>
            <input type="datetime-local" id="cd-date" />
          </div>
          <div class="form-group" style="display:flex;align-items:center;gap:8px">
            <input type="checkbox" id="cd-estimate" style="width:auto;accent-color:var(--purple)" />
            <label for="cd-estimate" style="text-transform:none;letter-spacing:0;font-size:13px;margin-bottom:0;cursor:pointer">Mark date as estimate (*)</label>
          </div>
          <button class="btn-publish" onclick="createCountdown()" style="width:100%;margin-top:0.25rem">Add Countdown</button>
          <div class="auth-error" id="cd-error" style="margin-top:6px"></div>
        </div>
      </details>

      <div style="font-weight:800;color:var(--text2);font-size:13px;letter-spacing:0.4px;text-transform:uppercase;margin-bottom:0.75rem">Active Countdowns</div>
      <div id="admin-cd-list"></div>
    </div>
  </div>
</div>


<!-- ══ EDIT POST MODAL ══ -->
<div class="modal-overlay" id="modal-edit">
  <div class="modal" style="max-width:600px">
    <h2>✏️ Edit Post</h2>
    <input type="hidden" id="edit-id" />
    <div class="form-group">
      <label>Category</label>
      <select id="edit-cat">
        <option value="news">🗞️ News</option>
        <option value="maintenance">🧑‍🔧 Maintenance</option>
        <option value="cosmetics">✨ Cosmetics</option>
        <option value="brawlpass">🎟️ Brawl Pass</option>
        <option value="brawltalk">📢 Brawl Talk</option>
      </select>
    </div>
    <div class="form-group">
      <label>Title</label>
      <input type="text" id="edit-title" />
    </div>
    <div class="form-group">
      <label>Description <span style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--text3)">(shown under title &amp; on cards)</span></label>
      <input type="text" id="edit-excerpt" placeholder="Short description…" />
    </div>
    <div class="form-group">
      <label>Publish date</label>
      <input type="datetime-local" id="edit-date" />
    </div>
    <div class="form-group">
      <label>Full content</label>
      <div class="rich-toolbar">
        <button type="button" onclick="fmtH1('edit-body')" title="Heading 1"><b>H1</b></button>
        <button type="button" onclick="fmtH2('edit-body')" title="Heading 2"><b>H2</b></button>
        <button type="button" onclick="fmtBold('edit-body')" title="Bold"><b>B</b></button>
        <button type="button" onclick="insertContentImage('edit-body')" title="Insert image">🖼</button>
      </div>
      <textarea id="edit-body" style="min-height:160px;font-family:monospace;font-size:13px"></textarea>
    </div>
    <div class="form-group">
      <label>Banner image</label>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <button type="button" class="btn-cancel" style="font-size:12px" onclick="triggerEditBannerUpload()">⬆ Upload image</button>
        <input type="file" id="edit-image-upload" accept="image/*" style="display:none" />
        <input type="text" id="edit-img" placeholder="or paste URL…" style="flex:1;min-width:160px" />
      </div>
      <div id="edit-img-preview" style="margin-top:6px"></div>
    </div>
    <div class="form-group">
      <label>Author</label>
      <input type="text" id="edit-author" />
    </div>
    <div class="auth-error" id="edit-error" style="margin-bottom:8px"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('modal-edit')">Cancel</button>
      <button class="btn-publish" onclick="saveEdit()">Save Changes</button>
    </div>
  </div>
</div>

<script>
/* ═══════════════════════════════
   BrawlMap News CMS
═══════════════════════════════ */

const CATEGORY_META = {
  news:        { label: 'News',        emoji: '🗞️',  cls: 'cat-news'       },
  maintenance: { label: 'Maintenance', emoji: '🧑‍🔧', cls: 'cat-maintenance' },
  cosmetics:   { label: 'Cosmetics',   emoji: '✨',  cls: 'cat-cosmetics'   },
  brawlpass:   { label: 'Brawl Pass',  emoji: '🎟️',  cls: 'cat-brawlpass'  },
  brawltalk:   { label: 'Brawl Talk',  emoji: '📢',  cls: 'cat-brawltalk'  },
};

let currentFilter = 'all';
let currentSearch = '';
let adminToken = localStorage.getItem('brawlmap_admin_token') || null;
let allPosts   = [];

/* ── Safe JSON fetch ── */
async function safeFetchJson(res) {
  const text = await res.text();
  if (!text) return null;
  try { return JSON.parse(text); }
  catch (_) { return { __rawText: text }; }
}

const CMS_API = 'https://test-production-182c.up.railway.app';

function withToken(url) {
  const tok = adminToken || localStorage.getItem('brawlmap_admin_token') || '';
  if (!tok) return url.startsWith('http') ? url : CMS_API + url;
  const base = url.startsWith('http') ? url : CMS_API + url;
  return base + (base.includes('?') ? '&' : '?') + 'token=' + encodeURIComponent(tok);
}

async function apiGet(url) {
  const res = await fetch(withToken(url));
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return safeFetchJson(res);
}

async function apiPost(url, data) {
  const res = await fetch(withToken(url), {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data)
  });
  const j = await safeFetchJson(res);
  if (res.status === 401) {
    // Token expired (server restarted) — clear it and force re-login
    adminToken = null;
    localStorage.removeItem('brawlmap_admin_token');
    throw new Error('Session expired — please log in again.');
  }
  if (!res.ok) throw new Error(`HTTP ${res.status}: ${j?.error || j?.__rawText || 'Request failed'}`);
  return j;
}

async function apiDelete(url) {
  const res = await fetch(withToken(url), { method: 'DELETE' });
  if (res.status === 401) {
    adminToken = null;
    localStorage.removeItem('brawlmap_admin_token');
    throw new Error('Session expired — please log in again.');
  }
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res;
}

async function apiPut(url, data) {
  // Server requires POST + ?_method=PUT to update (see server.py line 208-212)
  const base = withToken(url);
  const fullUrl = base + (base.includes('?') ? '&' : '?') + '_method=PUT';
  const res = await fetch(fullUrl, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data)
  });
  const j = await safeFetchJson(res);
  if (!res.ok) throw new Error(`HTTP ${res.status}: ${j?.error || j?.__rawText || 'Request failed'}`);
  return j;
}

/* ── Load posts ── */
async function loadPosts() {
  try {
    allPosts = await apiGet('/cms/posts') || [];
    return allPosts;
  } catch (err) {
    console.error('Failed to load posts:', err);
    allPosts = [];
    return [];
  }
}

/* ── Render feed ── */
async function renderFeed(forceReload = false) {
  if (forceReload || allPosts.length === 0) await loadPosts();
  const posts = allPosts;
  const feed = document.getElementById('news-feed');
  let filtered = currentFilter === 'all'
    ? posts
    : posts.filter(p => p.category === currentFilter);

  if (currentSearch) {
    const searchLower = currentSearch.toLowerCase();
    filtered = filtered.filter(p =>
      p.title.toLowerCase().includes(searchLower) ||
      p.excerpt.toLowerCase().includes(searchLower) ||
      p.body.toLowerCase().includes(searchLower)
    );
  }

  if (filtered.length === 0) {
    feed.innerHTML = `
      <div class="news-empty">
        <div class="news-empty-icon">📭</div>
        <h3>No posts yet</h3>
        <p>${currentFilter === 'all' && !currentSearch ? 'No news published yet.' : 'No posts match your filters.'}</p>
      </div>`;
    return;
  }

  feed.innerHTML = filtered.map(post => {
    const meta = CATEGORY_META[post.category] || CATEGORY_META.news;
    const date = new Date(post.createdAt).toLocaleDateString('en-US', {
      month: 'short', day: 'numeric', year: 'numeric'
    });
    const imgSrc = post.image
      ? (post.image.startsWith('http') ? post.image : CMS_API + post.image)
      : null;
    const banner = imgSrc
      ? `<img class="news-card-banner" src="${esc(imgSrc)}" alt="" onerror="this.style.display='none'">`
      : `<div class="news-card-banner-placeholder">${meta.emoji}</div>`;
    return `
      <a class="news-card" href="#post-${post.id}" onclick="openPost('${post.id}');return false;">
        ${banner}
        <div class="news-card-body">
          <div class="news-card-meta">
            <span class="news-card-category ${meta.cls}">${meta.label}</span>
            By ${esc(post.author)} · ${date}
          </div>
          <div class="news-card-title">${esc(post.title)}</div>
          ${post.excerpt ? `<div class="news-card-excerpt">${esc(post.excerpt)}</div>` : ''}
        </div>
      </a>`;
  }).join('');
}

function clearSearch() {
  const input = document.getElementById('search-input');
  input.value = '';
  document.getElementById('search-clear').classList.remove('visible');
  currentSearch = '';
  renderFeed(false);
  input.focus();
}

/* ── Category filter ── */
function filterCat(cat) {
  currentFilter = cat;
  renderFeed(false);
}

function filterSearch(query) {
  currentSearch = query.trim();
  renderFeed(false);
}

/* ══════════════════════════════
   SINGLE POST PAGE ROUTING
══════════════════════════════ */
function showView(view) {
  document.getElementById('view-feed').classList.remove('active');
  document.getElementById('view-post').classList.remove('active');
  document.getElementById('view-' + view).classList.add('active');
}

async function openPost(id) {
  // Ensure posts are loaded
  if (!allPosts.length) await loadPosts();
  const postIdx = allPosts.findIndex(p => p.id === id);
  if (postIdx === -1) return;
  const post = allPosts[postIdx];

  const meta = CATEGORY_META[post.category] || CATEGORY_META.news;
  const date = new Date(post.createdAt).toLocaleDateString('en-US', {
    month: 'short', day: 'numeric', year: 'numeric'
  });

  // Prev / Next (posts are newest-first; prev = older = higher index, next = newer = lower index)
  const prevPost = allPosts[postIdx + 1] || null;
  const nextPost = allPosts[postIdx - 1] || null;

  const prevBtn = prevPost
    ? `<button class="post-nav-btn" onclick="openPost('${prevPost.id}')">‹ Previous</button>`
    : `<span class="post-nav-btn disabled">‹ Previous</span>`;
  const nextBtn = nextPost
    ? `<button class="post-nav-btn" onclick="openPost('${nextPost.id}')">Next ›</button>`
    : `<span class="post-nav-btn disabled">Next ›</span>`;

  const postImgSrc = post.image
    ? (post.image.startsWith('http') ? post.image : CMS_API + post.image)
    : null;

  const thumbHtml = postImgSrc
    ? `<img class="post-header-thumb" src="${esc(postImgSrc)}" alt="" onerror="this.style.display='none'">`
    : `<div class="post-header-thumb-placeholder">${meta.emoji}</div>`;

  document.getElementById('post-content').innerHTML = `
    <div class="post-header-grid">
      <div class="post-header-left">
        <div style="margin-bottom:0.6rem">
          <span class="news-card-category ${meta.cls}">${meta.label}</span>
        </div>
        <div class="post-title">${esc(post.title)}</div>
        ${post.excerpt ? `<div class="post-subtitle">${esc(post.excerpt)}</div>` : ''}
        <div class="post-nav">
          ${prevBtn}
          <span class="post-nav-sep">|</span>
          ${nextBtn}
        </div>
        <div class="post-meta">
          <div class="post-meta-avatar">
            <span style="font-size:12px">${esc(post.author).charAt(0).toUpperCase()}</span>
          </div>
          <span>By <strong style="color:var(--text)">${esc(post.author)}</strong></span>
          <span style="color:var(--border2)">·</span>
          <span>${date}</span>
        </div>
      </div>
      ${thumbHtml}
    </div>
    <div class="post-body">${renderMarkdown(post.body)}</div>
  `;

  // Update URL hash so it's shareable
  history.pushState({ postId: id }, '', `#post-${id}`);
  document.title = `${post.title} — BrawlMap`;
  showView('post');
  window.scrollTo(0, 0);
}

function copyPostUrl() {
  try {
    navigator.clipboard.writeText(window.location.href);
    const btn = document.querySelector('.post-copy-url');
    if (btn) { const orig = btn.innerHTML; btn.innerHTML = '✓ Copied!'; setTimeout(() => btn.innerHTML = orig, 1800); }
  } catch (_) {}
}

function goBack() {
  history.pushState({}, '', window.location.pathname);
  document.title = 'BrawlMap — News';
  showView('feed');
}

/* Handle browser back/forward */
window.addEventListener('popstate', () => {
  const hash = window.location.hash;
  if (hash.startsWith('#post-')) {
    const id = hash.slice(6);
    openPost(id);
  } else {
    document.title = 'BrawlMap — News';
    showView('feed');
  }
});

/* On load, check if URL has a post hash */
async function handleInitialHash() {
  const hash = window.location.hash;
  if (hash.startsWith('#post-')) {
    await loadPosts();
    openPost(hash.slice(6));
  }
}

/* ══════════════════════════════
   COUNTDOWNS (localStorage)
══════════════════════════════ */
const CD_KEY = 'brawlmap_countdowns';

function loadCountdowns() {
  try { return JSON.parse(localStorage.getItem(CD_KEY) || '[]'); }
  catch(_) { return []; }
}

function saveCountdowns(list) {
  localStorage.setItem(CD_KEY, JSON.stringify(list));
}

function pad(n) { return String(n).padStart(2, '0'); }

function cdTimeStr(targetMs) {
  const diff = targetMs - Date.now();
  if (diff <= 0) return { text: 'Event started!', ended: true };
  const days    = Math.floor(diff / 86400000);
  const hours   = Math.floor((diff % 86400000) / 3600000);
  const minutes = Math.floor((diff % 3600000) / 60000);
  const seconds = Math.floor((diff % 60000) / 1000);
  const text = days > 0
    ? `${days}:${pad(hours)}:${pad(minutes)}:${pad(seconds)}`
    : `${pad(hours)}:${pad(minutes)}:${pad(seconds)}`;
  return { text, ended: false };
}

let cdTimerHandle = null;

function renderCountdowns() {
  const list = loadCountdowns();
  const section = document.getElementById('countdowns-section');
  const grid    = document.getElementById('countdowns-grid');
  if (!section && !grid) return; // countdowns moved to countdown.html

  if (cdTimerHandle) clearInterval(cdTimerHandle);

  if (list.length === 0) {
    section.style.display = 'none';
    return;
  }

  section.style.display = '';

  function updateTimes() {
    list.forEach(cd => {
      const el = document.getElementById(`cd-time-${cd.id}`);
      if (!el) return;
      const { text, ended } = cdTimeStr(cd.targetMs);
      el.textContent = text;
      el.className = 'cd-time' + (ended ? ' ended' : '');
    });
  }

  grid.innerHTML = list.map(cd => {
    const dateStr = new Date(cd.targetMs).toLocaleDateString('en-US', {
      month: 'long', day: 'numeric', year: 'numeric'
    });
    const { text, ended } = cdTimeStr(cd.targetMs);
    const deleteBtn = adminToken
      ? `<button class="btn-cd-delete" onclick="deleteCountdown('${cd.id}')">Remove</button>`
      : '';
    return `
      <div class="cd-news-card">
        <div class="cd-label"><span>⏳</span>Countdown${cd.estimate ? ' *' : ''}</div>
        <div class="cd-title">${esc(cd.title)}</div>
        ${cd.desc ? `<div class="cd-desc">${esc(cd.desc)}</div>` : ''}
        <div class="cd-time${ended ? ' ended' : ''}" id="cd-time-${cd.id}">${text}</div>
        <div class="cd-footer">📅 ${dateStr}</div>
        ${deleteBtn}
      </div>`;
  }).join('');

  cdTimerHandle = setInterval(updateTimes, 1000);
}

async function createCountdown() {
  const title    = document.getElementById('cd-title').value.trim();
  const desc     = document.getElementById('cd-desc').value.trim();
  const dateVal  = document.getElementById('cd-date').value;
  const estimate = document.getElementById('cd-estimate').checked;
  const errEl    = document.getElementById('cd-error');

  if (!title || !dateVal) {
    errEl.textContent = 'Title and date are required.';
    return;
  }
  errEl.textContent = '';

  const targetMs = new Date(dateVal).getTime();
  if (isNaN(targetMs)) {
    errEl.textContent = 'Invalid date.';
    return;
  }

  try {
    await apiPost('/cms/countdowns', { title, desc, targetMs, estimate });
    document.getElementById('cd-title').value = '';
    document.getElementById('cd-desc').value  = '';
    document.getElementById('cd-date').value  = '';
    document.getElementById('cd-estimate').checked = false;
    renderAdminCdList();
  } catch(err) {
    errEl.textContent = 'Failed to add: ' + err.message;
  }
}

async function deleteCountdown(id) {
  if (!confirm('Remove this countdown?')) return;
  try {
    await apiDelete(`/cms/countdowns/${id}`);
    renderAdminCdList();
  } catch(err) {
    alert('Failed to delete: ' + err.message);
  }
}

async function renderAdminCdList() {
  const el = document.getElementById('admin-cd-list');
  if (!el) return;
  let list = [];
  try {
    const res = await fetch(CMS_API + '/cms/countdowns');
    list = await res.json();
  } catch(_) {}
  if (list.length === 0) {
    el.innerHTML = '<div style="color:var(--text3);font-size:13px">No countdowns yet.</div>';
    return;
  }
  el.innerHTML = list.map(cd => {
    const dateStr = new Date(cd.targetMs).toLocaleDateString('en-US', {
      month: 'short', day: 'numeric', year: 'numeric'
    });
    return `
      <div class="admin-post-item">
        <div class="admin-post-item-title">${esc(cd.title)}${cd.estimate ? ' *' : ''}<span style="color:var(--text3);font-weight:600;font-size:11px;margin-left:8px">${dateStr}</span></div>
        <button class="btn-delete" onclick="deleteCountdown('${cd.id}')">Delete</button>
      </div>`;
  }).join('');
}

/* ── Admin tabs ── */
function switchAdminTab(tab, btn) {
  document.querySelectorAll('.admin-tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.admin-tab-panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('admin-tab-' + tab).classList.add('active');
  if (tab === 'countdown') renderAdminCdList();
}

/* ── Auth ── */
function openAdminGate() {
  if (adminToken) { openAdminPanel(); return; }
  document.getElementById('auth-error').textContent = '';
  document.getElementById('auth-pw').value = '';
  openModal('modal-auth');
  setTimeout(() => document.getElementById('auth-pw').focus(), 100);
}

async function tryLogin() {
  const pw = document.getElementById('auth-pw').value;
  try {
    const formData = new URLSearchParams();
    formData.append('password', pw);
    const res = await fetch(CMS_API + '/cms/login', {
      method: 'POST',
      body: formData
    });
    const data = await safeFetchJson(res) || {};
    if (!res.ok) throw new Error(data.error || data.__rawText || `Login failed (HTTP ${res.status})`);
    adminToken = data.token;
    localStorage.setItem('brawlmap_admin_token', adminToken);
    closeModal('modal-auth');
    openAdminPanel();
  } catch (err) {
    document.getElementById('auth-error').textContent = err.message || 'Wrong password.';
  }
}

function logoutAdmin() {
  adminToken = null;
  localStorage.removeItem('brawlmap_admin_token');
  closeModal('modal-admin');
  renderCountdowns(); // re-render to hide delete buttons
}

/* ── Admin panel ── */
async function openAdminPanel() {
  await renderAdminList();
  renderAdminCdList();
  renderCountdowns(); // show delete buttons
  openModal('modal-admin');
}

async function renderAdminList() {
  const posts = await loadPosts();
  const el = document.getElementById('admin-post-list');
  if (posts.length === 0) {
    el.innerHTML = '<div style="color:var(--text3);font-size:13px">No posts yet.</div>';
    return;
  }
  // Sort NEW → OLD
  const sorted = [...posts].sort((a,b) => b.createdAt - a.createdAt);
  el.innerHTML = sorted.map(p => {
    const d = new Date(p.createdAt);
    const pad = n => String(n).padStart(2,'0');
    const dateStr = `${pad(d.getDate())}/${pad(d.getMonth()+1)}/${d.getFullYear()}`;
    return `
    <div class="admin-post-item">
      <div class="admin-post-item-title">
        ${esc(p.title)}
        <span style="color:var(--text3);font-size:11px;font-weight:600;margin-left:6px">${dateStr}</span>
      </div>
      <div style="display:flex;gap:6px">
        <button class="btn-cancel" style="font-size:12px;padding:3px 10px" onclick="openEditPost('${p.id}')">Edit</button>
        <button class="btn-delete" onclick="deletePost('${p.id}')">Delete</button>
      </div>
    </div>`;
  }).join('');
}

async function deletePost(id) {
  if (!confirm('Delete this post?')) return;
  try {
    await apiDelete(`/cms/posts/${id}`);
    renderFeed(true);
    renderAdminList();
  } catch (err) {
    alert('Failed to delete post: ' + err.message);
  }
}

/* ── Rich editor helpers ── */
function insertAtCursor(id, before, after='') {
  const el = document.getElementById(id);
  const start = el.selectionStart, end = el.selectionEnd;
  const selected = el.value.slice(start, end);
  el.value = el.value.slice(0, start) + before + selected + after + el.value.slice(end);
  el.selectionStart = start + before.length;
  el.selectionEnd   = start + before.length + selected.length;
  el.focus();
}
function fmtBold(id='new-body')  { insertAtCursor(id, '**', '**'); }
function fmtH1(id='new-body')    { insertAtCursor(id, '# '); }
function fmtH2(id='new-body')    { insertAtCursor(id, '## '); }

async function insertContentImage(id='new-body') {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = 'image/*';
  input.onchange = async () => {
    const file = input.files[0]; if (!file) return;
    const fd = new FormData(); fd.append('image', file);
    try {
      const tok = adminToken || localStorage.getItem('brawlmap_admin_token') || '';
      const res = await fetch(withToken('/cms/upload'), { method: 'POST', body: fd });
      const data = await safeFetchJson(res) || {};
      if (!res.ok) throw new Error(data.error || 'Upload failed');
      const url = CMS_API + data.url;
      insertAtCursor(id, `![image](${url})`);
    } catch(e) { alert('Upload failed: ' + e.message); }
  };
  input.click();
}

/* ── Markdown renderer (simple) ── */
function renderMarkdown(text) {
  return text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/^# (.+)$/gm, '<h1 style="font-size:1.5em;font-weight:800;margin:1rem 0 0.4rem">$1</h1>')
    .replace(/^## (.+)$/gm, '<h2 style="font-size:1.2em;font-weight:800;margin:0.9rem 0 0.3rem">$1</h2>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/!\[.*?\]\((https?:\/\/[^\)]+)\)/g, '<img src="$1" style="max-width:100%;border-radius:8px;margin:0.5rem 0" alt="">')
    .replace(/\n/g, '<br>');
}

/* ── Publish post ── */
async function publishPost() {
  const title   = document.getElementById('new-title').value.trim();
  const excerpt = document.getElementById('new-excerpt').value.trim();
  const body    = document.getElementById('new-body').value.trim();
  const cat     = document.getElementById('new-cat').value;
  const img     = document.getElementById('new-img').value.trim();
  const author  = document.getElementById('new-author').value.trim() || 'Admin';
  const dateVal = document.getElementById('new-date').value;
  const errEl   = document.getElementById('publish-error');

  if (!title || !body) {
    errEl.textContent = 'Title and content are required.';
    return;
  }
  errEl.textContent = '';

  const createdAt = dateVal ? new Date(dateVal).getTime() : Date.now();

  try {
    await apiPost('/cms/posts', { title, excerpt, body, category: cat, image: img, author, createdAt });
    ['new-title','new-excerpt','new-body','new-img','new-date'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('new-author').value = 'Admin';
    renderFeed(true);
    renderAdminList();
  } catch (err) {
    errEl.textContent = 'Failed to publish: ' + err.message;
  }
}

/* ── Edit post ── */
function openEditPost(id) {
  const post = allPosts.find(p => p.id === id);
  if (!post) return;
  document.getElementById('edit-id').value      = post.id;
  document.getElementById('edit-title').value   = post.title;
  document.getElementById('edit-excerpt').value = post.excerpt || '';
  document.getElementById('edit-body').value    = post.body;
  document.getElementById('edit-cat').value     = post.category || 'news';
  document.getElementById('edit-img').value     = post.image || '';
  document.getElementById('edit-author').value  = post.author || 'Admin';
  document.getElementById('edit-error').textContent = '';
  // Set datetime-local value
  const dt = new Date(post.createdAt);
  const pad = n => String(n).padStart(2,'0');
  document.getElementById('edit-date').value =
    `${dt.getFullYear()}-${pad(dt.getMonth()+1)}-${pad(dt.getDate())}T${pad(dt.getHours())}:${pad(dt.getMinutes())}`;
  closeModal('modal-admin');
  openModal('modal-edit');
}

async function saveEdit() {
  const id      = document.getElementById('edit-id').value;
  const title   = document.getElementById('edit-title').value.trim();
  const excerpt = document.getElementById('edit-excerpt').value.trim();
  const body    = document.getElementById('edit-body').value.trim();
  const cat     = document.getElementById('edit-cat').value;
  const img     = document.getElementById('edit-img').value.trim();
  const author  = document.getElementById('edit-author').value.trim() || 'Admin';
  const dateVal = document.getElementById('edit-date').value;
  const errEl   = document.getElementById('edit-error');

  if (!title || !body) {
    errEl.textContent = 'Title and content are required.';
    return;
  }
  const createdAt = dateVal ? new Date(dateVal).getTime() : undefined;

  try {
    await apiPut(`/cms/posts/${id}`, { title, excerpt, body, category: cat, image: img, author, ...(createdAt ? {createdAt} : {}), editedAt: Date.now() });
    closeModal('modal-edit');
    openModal('modal-admin');
    renderFeed(true);
    renderAdminList();
  } catch(err) {
    errEl.textContent = 'Failed to save: ' + err.message;
  }
}

/* ── Image upload ── */
async function uploadBanner(file, imgInputId, previewId) {
  const fd = new FormData(); fd.append('image', file);
  try {
    const res = await fetch(withToken('/cms/upload'), { method: 'POST', body: fd });
    const data = await safeFetchJson(res) || {};
    if (!res.ok) throw new Error(data.error || 'Upload failed');
    const fullUrl = data.url.startsWith('http') ? data.url : CMS_API + data.url;
    document.getElementById(imgInputId).value = fullUrl;
    const prev = document.getElementById(previewId);
    if (prev) prev.innerHTML = `<img src="${fullUrl}" style="max-height:80px;border-radius:6px;margin-top:4px">`;
  } catch(e) { alert('Upload failed: ' + e.message); }
}

function triggerBannerUpload() {
  const input = document.getElementById('image-upload');
  input.onchange = () => { if(input.files[0]) uploadBanner(input.files[0], 'new-img', 'new-img-preview'); };
  input.click();
}

function triggerEditBannerUpload() {
  const input = document.getElementById('edit-image-upload');
  input.onchange = () => { if(input.files[0]) uploadBanner(input.files[0], 'edit-img', 'edit-img-preview'); };
  input.click();
}

function openModal(id)  { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

/* Close on backdrop click */
document.querySelectorAll('.modal-overlay').forEach(overlay => {
  overlay.addEventListener('click', e => {
    if (e.target === overlay) overlay.classList.remove('open');
  });
});

function esc(str) {
  return String(str ?? '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}



/* ── Init ── */
renderFeed();
document.getElementById('cat-dropdown').value = currentFilter;
renderCountdowns();
handleInitialHash();
</script>
